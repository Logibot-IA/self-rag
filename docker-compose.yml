services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    mem_limit: 12g
    memswap_limit: 16g
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        ollama serve &
        until ollama list; do sleep 2; done &&
        ollama pull mistral &&
        ollama pull nomic-embed-text &&
        wait
      "

  api:
    build: .
    container_name: self-rag-api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - chroma_data:/app/chroma_db

  evaluator:
    build: .
    container_name: ragas-evaluator
    depends_on:
      - ollama
    volumes:
      - chroma_data:/app/chroma_db
    entrypoint: >
      sh -c "
        until curl -s http://ollama:11434/api/tags | grep mistral; do sleep 5; done &&
        python -m src.evaluate"

volumes:
  ollama_data:
  chroma_data: