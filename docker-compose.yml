version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "8001:8000"

  api:
    build: .
    container_name: self-rag-api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - chroma

  evaluator:
    build: .
    container_name: ragas-evaluator
    depends_on:
      - ollama
      - chroma
    command: python app/evaluate.py

volumes:
  ollama_data: